name: IPTV Listesini Guncelle

on:
  push:
    paths:
      - 'liste.m3u'
  workflow_dispatch:

permissions:
  contents: write  # 403 hatasını çözen kritik yetki

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Scripti Calistir
      run: python stream.py

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tv/streams.json
        # Değişiklik varsa commit at, yoksa hata vermeden geç
        git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik: streams.json guncellendi" && git push)
