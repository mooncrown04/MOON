name: IPTV Listesini Guncelle

on:
  push:
    paths:
      - 'liste.m3u'  # Sadece liste.m3u dosyasında değişiklik yapınca çalışır
  workflow_dispatch: # İstediğinde manuel başlatabilmen için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Stream Scriptini Calistir
      run: python streams.py  # Dosya ismini burada güncelledik

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tv/streams.json
        # Eğer dosyada değişiklik yoksa hata vermemesi için kontrol ekledik
        git diff --quiet && git diff --staged --quiet || git commit -m "Otomatik: streams.json guncellendi"
        git push
