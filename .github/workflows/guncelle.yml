name: MoOnCrOwN Addon Builder

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Sistemi Guncelle
        run: python stream.py
      
      - name: Degisiklikleri Yukle
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Hepsini ekle (manifest.json ve tüm alt klasörler)
          git add -A
          
          # Değişiklik kontrolü ve commit
          git commit -m "Auto Update: Manifest and Assets $(date +'%Y-%m-%d %H:%M')" || echo "Degisiklik yok"
          git push
