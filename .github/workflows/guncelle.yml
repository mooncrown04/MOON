name: IPTV Otomatik Guncelleme

on:
  push:
    paths:
      - 'liste.m3u'  # liste.m3u değişince çalışır
  schedule:
    - cron: '0 3 * * *'  # Her gün Türkiye saatiyle 06:00'da (UTC 03:00) çalışır
  workflow_dispatch:      # İstediğinde manuel başlatabilmen için

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Scripti Calistir
      run: python stream.py

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Sadece stream/tv klasöründeki JSON dosyalarını ekle
        git add stream/tv/*.json
        
        # Değişiklik varsa commit at ve pushla
        git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: $(date +'%Y-%m-%d %H:%M')" && git push)
